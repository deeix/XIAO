name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project XIAOCompanion.xcodeproj \
            -scheme XIAOCompanion \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/XIAOCompanion.app Payload/
          /usr/bin/zip -r XIAOCompanion.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XIAOCompanion-unsigned-ipa
          path: XIAOCompanion.ipa

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run protocol tests
        run: node --test tests/protocol.test.js

      - name: Run iOS unit tests
        run: |
          xcodebuild test \
            -project XIAOCompanion.xcodeproj \
            -scheme XIAOCompanion \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project XIAOCompanion.xcodeproj \
            -scheme XIAOCompanion \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/XIAO Notify.app" Payload/
          /usr/bin/zip -r XIAO-Notify.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XIAO-Notify-unsigned-ipa
          path: XIAO-Notify.ipa

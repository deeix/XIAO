name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select simulator
        run: |
          set -e
          xcrun simctl list devices available

          preferred_devices=(
            "iPhone 16 Pro"
            "iPhone 16"
            "iPhone 15 Pro"
            "iPhone 15"
          )

          simulator_udid=""
          simulator_name=""

          for candidate in "${preferred_devices[@]}"; do
            simulator_udid=$(xcrun simctl list devices available -j | ruby -rjson -e '
              data = JSON.parse(STDIN.read)
              candidate = ARGV[0]
              devices = data.fetch("devices", {}).values.flatten
              match = devices.find { |device| device["isAvailable"] && device["name"] == candidate }
              print(match["udid"]) if match
            ' "$candidate")

            if [ -n "$simulator_udid" ]; then
              simulator_name="$candidate"
              break
            fi
          done

          if [ -z "$simulator_udid" ]; then
            echo "No supported iOS simulator found on the runner" >&2
            exit 1
          fi

          echo "Using simulator: $simulator_name ($simulator_udid)"
          xcrun simctl boot "$simulator_udid" || true
          echo "SIMULATOR_UDID=$simulator_udid" >> "$GITHUB_ENV"

      - name: Run protocol tests
        run: node --test tests/protocol.test.js

      - name: Build iOS app for simulator
        run: |
          set -eo pipefail
          xcodebuild build \
            -project XIAOCompanion.xcodeproj \
            -scheme XIAOCompanion \
            -sdk iphonesimulator \
            -destination "id=${SIMULATOR_UDID}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build unsigned app
        run: |
          set -eo pipefail
          xcodebuild \
            -project XIAOCompanion.xcodeproj \
            -scheme XIAOCompanion \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/XIAO Notify.app" Payload/
          /usr/bin/zip -r XIAO-Notify.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XIAO-Notify-unsigned-ipa
          path: XIAO-Notify.ipa
